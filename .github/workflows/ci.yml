name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet build Threadia.slnx --configuration Release
      - name: Unit tests
        run: dotnet test tests/Backend/UnitTests --configuration Release --no-build
      - name: Integration tests
        run: dotnet test tests/Backend/IntegrationTests --configuration Release --no-build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Frontend/package-lock.json
      - run: npm ci
      - name: Type check & build
        run: npm run build
      - name: Tests
        run: npm test
