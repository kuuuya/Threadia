# 開発用インフラ。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: threadia
      POSTGRES_USER: threadia
      POSTGRES_PASSWORD: threadia
    ports:
      # ローカルに PostgreSQL が既にある環境(5432/5433)と競合しないよう 15432 を公開する。
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threadia"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: threadia
      RABBITMQ_DEFAULT_PASS: threadia
    ports:
      - "5672:5672"
      - "15672:15672" # 管理UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  # S3互換オブジェクトストレージ(添付ファイル用)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: threadia
      MINIO_ROOT_PASSWORD: threadia-secret
    ports:
      - "9000:9000"
      - "9001:9001" # 管理UI
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
